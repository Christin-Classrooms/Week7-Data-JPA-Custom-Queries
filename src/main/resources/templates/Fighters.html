<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
    </div>

    <div class="fighters-card">
        <div style="padding: 20px; border-bottom: 1px solid #e0e0e0;">
            <form method="get" th:action="@{/fighters}" style="display: flex; gap: 15px; align-items: flex-end;">
                <div style="flex: 1;">
                    <label for="search-input" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">
                        Search by Fighter's name
                    </label>
                        <input type="text" id="search-input" name="search" th:value="${search}" placeholder="Fighter's Name" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                </div>

                <div style="min-width: 150px;">
                    <label for="sort-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Filter</label>
                    <select id="sort-select" name="filterType" onchange="this.form.submit();" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="all" th:selected="${filterType == 'all'}">All</option>
                        <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                        <option value="health" th:selected="${filterType == 'health'}">By Health</option>
                        <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                        <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                    </select>
                </div>

                <div style="min-width: 120px;">
                    <label for="direction-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">
                        Direction
                    </label>
                    <select id="direction-select" name="direction" onchange="this.form.submit();" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="ASC" th:selected="${direction == 'ASC'}">Ascending</option>
                        <option value="DESC" th:selected="${direction == 'DESC'}">Descending</option>
                    </select>
                </div>

                <button type="submit" style="padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">
                    Search
                </button>

                <a th:href="@{/fighters}" style="padding: 8px 16px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block;">
                    Clear
                </a>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table align-middle" style="margin-bottom: 0;">
                <thead style="background-color: #f5f5f5; border-bottom: 2px solid #ddd;">
                    <tr>
                        <th scope="col" style="padding: 15px; font-weight: 600; color: #333; width: 35%; text-align: left;">
                            <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${pageSize}, sort='name', direction=${direction=='ASC'?'DESC':'ASC'})}" style="color: #333; text-decoration: none; cursor: pointer;">
                                Name
                                <span style="font-size: 12px; color: #999;" th:if="${sort == 'name'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                            </a>
                        </th>
                        <th scope="col" style="padding: 15px; font-weight: 600; color: #333; width: 25%; text-align: center;">
                            <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${pageSize}, sort='health', direction=${direction=='ASC'?'DESC':'ASC'})}" style="color: #333; text-decoration: none; cursor: pointer;">
                                Health
                                <span style="font-size: 12px; color: #999;" th:if="${sort == 'health'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                            </a>
                        </th>
                        <th scope="col" style="padding: 15px; font-weight: 600; color: #333; width: 25%; text-align: center;">
                            <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${pageSize}, sort='damage', direction=${direction=='ASC'?'DESC':'ASC'})}" style="color: #333; text-decoration: none; cursor: pointer;">
                                Damage
                                <span style="font-size: 12px; color: #999;" th:if="${sort == 'damage'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                                </span>
                            </a>
                        </th>
                        <th scope="col" style="padding: 15px; font-weight: 600; color: #333; width: 25%; text-align: center;">
                            <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${pageSize}, sort='resistance', direction=${direction=='ASC'?'DESC':'ASC'})}" style="color: #333; text-decoration: none; cursor: pointer;">
                                Resistance
                                <span style="font-size: 12px; color: #999;" th:if="${sort == 'resistance'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                                </span>
                            </a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="fighter, itr : ${fighters}">
                        <td style="padding: 15px; color: #0066cc; cursor: pointer; text-align: left;" th:text="${fighter.name}">Michael Newman</td>
                        <td style="padding: 15px; color: #666; text-align: center;" th:text="${fighter.health}">1500</td>
                        <td style="padding: 15px; color: #999; font-size: 14px; text-align: center;" th:text="${fighter.damage}">100</td>
                        <td style="padding: 15px; color: #999; font-size: 14px; text-align: center;" th:text="${fighter.resistance}">10</td>
                    </tr>
                    <tr th:if="${fighters.isEmpty()}" style="border-bottom: 1px solid #eee;">
                        <td colspan="4" style="padding: 20px; text-align: center; color: #999;">
                            No Fighters Found
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div style="padding: 15px 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #666;">
        <span id="showing-info">
            Showing <span th:text="${currentPage * pageSize + 1}">1</span>
            to <span th:text="${(currentPage + 1) * pageSize > totalElements ? totalElements : (currentPage + 1) * pageSize}">10</span>
            of <span th:text="${totalElements}">100</span> entries
        </span>
        <div style="display: flex; gap: 5px; align-items: center;">
            <a th:if="${currentPage > 0}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=0, size=${pageSize}, sort=${sort}, direction=${direction})}" style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                « First
            </a>
            <span th:if="${currentPage == 0}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                « First
            </span>
            <a th:if="${hasPrevious}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage - 1}, size=${pageSize}, sort=${sort}, direction=${direction})}" style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                ‹ Prev
            </a>
            <span th:if="${!hasPrevious}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                ‹ Prev
            </span>
            <span style="padding: 6px 10px; font-size: 12px;">
                Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">5</span>
            </span>
            <a th:if="${hasNext}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage + 1}, size=${pageSize}, sort=${sort}, direction=${direction})}" style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                Next ›
            </a>
            <span th:if="${!hasNext}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                Next ›
            </span>
            <a th:if="${currentPage < totalPages - 1}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${totalPages - 1}, size=${pageSize}, sort=${sort}, direction=${direction})}" style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                Last »
            </a>
            <span th:if="${currentPage >= totalPages - 1}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                Last »
            </span>
        </div>
    </div>
</div>

<div style="display: flex; justify-content: center; margin-top: 20px;">
    <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
