<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">
            Showing <span th:text="${#lists.size(fighters)}">0</span> of
            <span th:text="${totalElements}">0</span> fighters
        </p>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/fighters}" method="get" class="row g-3">
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="sort" th:value="${sort}" />
                <input type="hidden" name="direction" th:value="${direction}" />

                <div class="col-md-5">
                    <input type="text" class="form-control" name="search"
                           th:value="${search}" placeholder="Search by name..."/>
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="filterType">
                        <option value="all" th:selected="${filterType == 'all'}">All Fighters</option>
                        <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                        <option value="health" th:selected="${filterType == 'health'}">By Health ></option>
                        <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest (by Damage)</option>
                        <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced (Health ≥ 1000, Damage ≤ 50)</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary">Apply</button>
                    <a href="/fighters" class="btn btn-secondary">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='name', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}"
                           class="text-decoration-none text-dark">
                            Name
                            <span th:if="${sort == 'name' and direction == 'ASC'}">↑</span>
                            <span th:if="${sort == 'name' and direction == 'DESC'}">↓</span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='health', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}"
                           class="text-decoration-none text-dark">
                            Health
                            <span th:if="${sort == 'health' and direction == 'ASC'}">↑</span>
                            <span th:if="${sort == 'health' and direction == 'DESC'}">↓</span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='damage', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}"
                           class="text-decoration-none text-dark">
                            Damage
                            <span th:if="${sort == 'damage' and direction == 'ASC'}">↑</span>
                            <span th:if="${sort == 'damage' and direction == 'DESC'}">↓</span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='resistance', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}"
                           class="text-decoration-none text-dark">
                            Resistance
                            <span th:if="${sort == 'resistance' and direction == 'ASC'}">↑</span>
                            <span th:if="${sort == 'resistance' and direction == 'DESC'}">↓</span>
                        </a>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fighter,itr : ${fighters}">
                    <th scope="row" th:text="${currentPage * pageSize + itr.index + 1}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav aria-label="Page navigation" th:if="${totalPages > 0}" class="mt-3">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">First</a>
            </li>

            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=${currentPage-1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Previous</a>
            </li>

            <li th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                th:if="${i >= currentPage-2 and i <= currentPage+2}"
                class="page-item" th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
                   th:text="${i+1}">1</a>
            </li>

            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=${currentPage+1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Next</a>
            </li>

            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=${totalPages-1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Last</a>
            </li>
        </ul>
        <p class="text-center text-muted small">
            Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
        </p>
    </nav>

    <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
