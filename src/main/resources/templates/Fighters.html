<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Fighters</title>
</head>

<body>

<h1>Fighters</h1>

<form method="get" th:action="@{/fighters}">

    <input type="text"
           name="search"
           placeholder="Search name or health"
           th:value="${search}" />

    <select name="filterType">

        <option value="">All</option>

        <option value="name"
                th:selected="${filterType == 'name'}">
            By Name
        </option>

        <option value="health"
                th:selected="${filterType == 'health'}">
            By Health
        </option>

        <option value="strongest"
                th:selected="${filterType == 'strongest'}">
            Strongest
        </option>

        <option value="balanced"
                th:selected="${filterType == 'balanced'}">
            Balanced
        </option>

    </select>

    <button type="submit">Search</button>

    <a th:href="@{/fighters}">
        <button type="button">Clear</button>
    </a>

</form>

<br>

<table border="1">

<thead>

<tr>

<th>
<a th:href="@{/fighters(sort='name', direction=${direction=='ASC'?'DESC':'ASC'})}">
Name
<span th:text="${sort=='name'} ? (${direction=='ASC'} ? '↑':'↓') : ''"></span>
</a>
</th>

<th>
<a th:href="@{/fighters(sort='health', direction=${direction=='ASC'?'DESC':'ASC'})}">
Health
<span th:text="${sort=='health'} ? (${direction=='ASC'} ? '↑':'↓') : ''"></span>
</a>
</th>

<th>
<a th:href="@{/fighters(sort='damage', direction=${direction=='ASC'?'DESC':'ASC'})}">
Damage
<span th:text="${sort=='damage'} ? (${direction=='ASC'} ? '↑':'↓') : ''"></span>
</a>
</th>

<th>
<a th:href="@{/fighters(sort='resistance', direction=${direction=='ASC'?'DESC':'ASC'})}">
Resistance
<span th:text="${sort=='resistance'} ? (${direction=='ASC'} ? '↑':'↓') : ''"></span>
</a>
</th>

</tr>

</thead>

<tbody>

<tr th:each="fighter : ${fighters}">

<td th:text="${fighter.name}"></td>
<td th:text="${fighter.health}"></td>
<td th:text="${fighter.damage}"></td>
<td th:text="${fighter.resistance}"></td>

</tr>

</tbody>

</table>

<br>

<div>

<a th:if="${hasPrevious}"
   th:href="@{/fighters(page=${currentPage-1}, sort=${sort}, direction=${direction})}">
Previous
</a>

<span th:text="'Page ' + (${currentPage}+1) + ' of ' + ${totalPages}"></span>

<a th:if="${hasNext}"
   th:href="@{/fighters(page=${currentPage+1}, sort=${sort}, direction=${direction})}">
Next
</a>

</div>

</body>
</html>
