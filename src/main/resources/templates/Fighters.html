<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighter Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Fighter Management</h1>
        
       
        <div class="mb-3">
            <a href="/fighters/new" class="btn btn-primary">Add New Fighter</a>
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
        
      
        <div class="card mb-4">
            <div class="card-header">
                <h5>Search & Filter Fighters</h5>
            </div>
            <div class="card-body">
                <form method="get" action="/fighters" class="row g-3">
                    <div class="col-md-4">
                        <label for="search" class="form-label">Search</label>
                        <input type="text" class="form-control" id="search" name="search" 
                               th:value="${search}" placeholder="Enter search term...">
                    </div>
                    <div class="col-md-3">
                        <label for="filterType" class="form-label">Filter Type</label>
                        <select class="form-select" id="filterType" name="filterType">
                            <option value="" th:selected="${filterType == null}">All Fighters</option>
                            <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                            <option value="health" th:selected="${filterType == 'health'}">By Health ></option>
                            <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                            <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                        </select>
                    </div>
                    <div class="col-md-5 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary me-2">Apply Filters</button>
                        <a href="/fighters" class="btn btn-secondary">Clear</a>
                    </div>
                    
                    
                    <input type="hidden" name="page" value="0">
                    <input type="hidden" name="sort" th:value="${sort}">
                    <input type="hidden" name="direction" th:value="${direction}">
                </form>
            </div>
        </div>
        
        
        <div class="card">
            <div class="card-header">
                <h5>Fighters List</h5>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>
                                <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='name', 
                                   direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'}, 
                                   search=${search}, filterType=${filterType})}" 
                                   class="text-decoration-none">
                                    Name
                                    <span th:if="${sort == 'name'}">
                                        <span th:if="${direction == 'ASC'}">↑</span>
                                        <span th:if="${direction == 'DESC'}">↓</span>
                                    </span>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='health', 
                                   direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'}, 
                                   search=${search}, filterType=${filterType})}" 
                                   class="text-decoration-none">
                                    Health
                                    <span th:if="${sort == 'health'}">
                                        <span th:if="${direction == 'ASC'}">↑</span>
                                        <span th:if="${direction == 'DESC'}">↓</span>
                                    </span>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='damage', 
                                   direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'}, 
                                   search=${search}, filterType=${filterType})}" 
                                   class="text-decoration-none">
                                    Damage
                                    <span th:if="${sort == 'damage'}">
                                        <span th:if="${direction == 'ASC'}">↑</span>
                                        <span th:if="${direction == 'DESC'}">↓</span>
                                    </span>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='resistance', 
                                   direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'}, 
                                   search=${search}, filterType=${filterType})}" 
                                   class="text-decoration-none">
                                    Resistance
                                    <span th:if="${sort == 'resistance'}">
                                        <span th:if="${direction == 'ASC'}">↑</span>
                                        <span th:if="${direction == 'DESC'}">↓</span>
                                    </span>
                                </a>
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="fighter : ${fighters}">
                            <td th:text="${fighter.name}"></td>
                            <td th:text="${fighter.health}"></td>
                            <td th:text="${fighter.damage}"></td>
                            <td th:text="${fighter.resistance}"></td>
                            <td>
                                <a th:href="@{/fighters/edit/{id}(id=${fighter.id})}" 
                                   class="btn btn-sm btn-warning">Edit</a>
                                <a th:href="@{/fighters/delete/{id}(id=${fighter.id})}" 
                                   class="btn btn-sm btn-danger" 
                                   onclick="return confirm('Are you sure you want to delete this fighter?')">Delete</a>
                            </td>
                        </tr>
                        <tr th:if="${fighters.empty}">
                            <td colspan="5" class="text-center">No fighters found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        
        <nav aria-label="Page navigation" class="mt-4" th:if="${totalPages > 0}">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span>Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span></span>
                    <span class="ms-2">(Total fighters: <span th:text="${totalElements}"></span>)</span>
                </div>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                        <a class="page-link" 
                           th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction}, 
                              search=${search}, filterType=${filterType})}">First</a>
                    </li>
                    <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                        <a class="page-link" 
                           th:href="@{/fighters(page=${currentPage - 1}, size=${pageSize}, sort=${sort}, 
                              direction=${direction}, search=${search}, filterType=${filterType})}">Previous</a>
                    </li>
                    
                    
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                        th:if="${i >= currentPage - 2 and i <= currentPage + 2}">
                        <a class="page-link" 
                           th:classappend="${i == currentPage} ? 'active' : ''"
                           th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction}, 
                              search=${search}, filterType=${filterType})}" 
                           th:text="${i + 1}"></a>
                    </li>
                    
                    <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                        <a class="page-link" 
                           th:href="@{/fighters(page=${currentPage + 1}, size=${pageSize}, sort=${sort}, 
                              direction=${direction}, search=${search}, filterType=${filterType})}">Next</a>
                    </li>
                    <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                        <a class="page-link" 
                           th:href="@{/fighters(page=${totalPages - 1}, size=${pageSize}, sort=${sort}, 
                              direction=${direction}, search=${search}, filterType=${filterType})}">Last</a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
</body>
</html>
