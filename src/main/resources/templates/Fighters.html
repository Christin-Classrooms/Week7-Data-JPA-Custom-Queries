<head>

<body>

<div class="app-container">

```
<div class="app-header text-center" style="margin-bottom:30px;">
    <h2>Fighters</h2>
    <p class="text-muted">
        Total: <span th:text="${totalElements}">0</span> fighters
    </p>
</div>

<div class="players-card">

    <!-- SEARCH / FILTER SECTION -->
    <div style="padding:20px;border-bottom:1px solid #e0e0e0;">
        <form method="get" th:action="@{/fighters}" style="display:flex;gap:15px;align-items:flex-end;flex-wrap:wrap;">

            <!-- Search -->
            <div>
                <label style="font-weight:600;">Search</label>
                <input type="text"
                       name="search"
                       th:value="${search}"
                       placeholder="Search fighter..."
                       style="padding:8px;border:1px solid #ccc;border-radius:4px;">
            </div>

            <!-- Filter Type -->
            <div>
                <label style="font-weight:600;">Filter</label>
                <select name="filterType" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
                    <option value="all" th:selected="${filterType=='all'}">All</option>
                    <option value="name" th:selected="${filterType=='name'}">By Name</option>
                    <option value="health" th:selected="${filterType=='health'}">By Health</option>
                    <option value="strongest" th:selected="${filterType=='strongest'}">Strongest</option>
                    <option value="balanced" th:selected="${filterType=='balanced'}">Balanced</option>
                </select>
            </div>

            <!-- Sort -->
            <div>
                <label style="font-weight:600;">Sort By</label>
                <select name="sort" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
                    <option value="id" th:selected="${sort=='id'}">ID</option>
                    <option value="name" th:selected="${sort=='name'}">Name</option>
                    <option value="health" th:selected="${sort=='health'}">Health</option>
                    <option value="damage" th:selected="${sort=='damage'}">Damage</option>
                    <option value="resistance" th:selected="${sort=='resistance'}">Resistance</option>
                </select>
            </div>

            <!-- Direction -->
            <div>
                <label style="font-weight:600;">Direction</label>
                <select name="direction" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
                    <option value="ASC" th:selected="${direction=='ASC'}">Ascending</option>
                    <option value="DESC" th:selected="${direction=='DESC'}">Descending</option>
                </select>
            </div>

            <!-- Page Size -->
            <div>
                <label style="font-weight:600;">Per Page</label>
                <select name="size" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
                    <option value="10" th:selected="${pageSize==10}">10</option>
                    <option value="25" th:selected="${pageSize==25}">25</option>
                    <option value="50" th:selected="${pageSize==50}">50</option>
                </select>
            </div>

            <!-- Submit -->
            <button type="submit"
                    style="padding:8px 16px;background:#007bff;color:white;border:none;border-radius:4px;font-weight:600;">
                Search
            </button>

            <!-- Reset -->
            <a th:href="@{/fighters}"
               style="padding:8px 16px;background:#6c757d;color:white;border-radius:4px;text-decoration:none;">
                Clear
            </a>

        </form>
    </div>


    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table align-middle">

            <thead>
            <tr>

                <th>#</th>

                <!-- NAME SORT -->
                <th>
                    <a th:href="@{/fighters(search=${search},filterType=${filterType},page=${currentPage},size=${pageSize},sort='name',direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Name
                        <span th:if="${sort=='name'}">
                            <span th:if="${direction=='ASC'}">↑</span>
                            <span th:if="${direction=='DESC'}">↓</span>
                        </span>
                    </a>
                </th>

                <!-- HEALTH SORT -->
                <th>
                    <a th:href="@{/fighters(search=${search},filterType=${filterType},page=${currentPage},size=${pageSize},sort='health',direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Health
                        <span th:if="${sort=='health'}">
                            <span th:if="${direction=='ASC'}">↑</span>
                            <span th:if="${direction=='DESC'}">↓</span>
                        </span>
                    </a>
                </th>

                <!-- DAMAGE SORT -->
                <th>
                    <a th:href="@{/fighters(search=${search},filterType=${filterType},page=${currentPage},size=${pageSize},sort='damage',direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Damage
                        <span th:if="${sort=='damage'}">
                            <span th:if="${direction=='ASC'}">↑</span>
                            <span th:if="${direction=='DESC'}">↓</span>
                        </span>
                    </a>
                </th>

                <!-- RESISTANCE SORT -->
                <th>
                    <a th:href="@{/fighters(search=${search},filterType=${filterType},page=${currentPage},size=${pageSize},sort='resistance',direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Resistance
                        <span th:if="${sort=='resistance'}">
                            <span th:if="${direction=='ASC'}">↑</span>
                            <span th:if="${direction=='DESC'}">↓</span>
                        </span>
                    </a>
                </th>

            </tr>
            </thead>

            <tbody>

            <tr th:each="fighter,itr : ${fighters}">
                <td th:text="${itr.count + currentPage * pageSize}">1</td>
                <td th:text="${fighter.name}">Name</td>
                <td th:text="${fighter.health}">1000</td>
                <td th:text="${fighter.damage}">50</td>
                <td th:text="${fighter.resistance}">5</td>
            </tr>

            <tr th:if="${fighters.isEmpty()}">
                <td colspan="5" style="text-align:center;">No fighters found</td>
            </tr>

            </tbody>

        </table>
    </div>


    <!-- PAGINATION -->
    <div style="padding:15px;border-top:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;">

        <span>
            Page <span th:text="${currentPage+1}">1</span>
            of
            <span th:text="${totalPages}">1</span>
        </span>

        <div style="display:flex;gap:8px;">

            <!-- FIRST -->
            <a th:if="${currentPage>0}"
               th:href="@{/fighters(page=0,size=${pageSize},search=${search},sort=${sort},direction=${direction},filterType=${filterType})}">
                First
            </a>

            <!-- PREVIOUS -->
            <a th:if="${hasPrevious}"
               th:href="@{/fighters(page=${currentPage-1},size=${pageSize},search=${search},sort=${sort},direction=${direction},filterType=${filterType})}">
                Previous
            </a>

            <!-- NEXT -->
            <a th:if="${hasNext}"
               th:href="@{/fighters(page=${currentPage+1},size=${pageSize},search=${search},sort=${sort},direction=${direction},filterType=${filterType})}">
                Next
            </a>

            <!-- LAST -->
            <a th:if="${currentPage < totalPages-1}"
               th:href="@{/fighters(page=${totalPages-1},size=${pageSize},search=${search},sort=${sort},direction=${direction},filterType=${filterType})}">
                Last
            </a>

        </div>
    </div>

</div>

<div class="mt-3">
    <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
</div>
