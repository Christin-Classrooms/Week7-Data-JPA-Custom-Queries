<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center" style="margin-bottom: 20px;">
        <h2>Fighters</h2>
        <p class="text-muted">Total: <span th:text="${total}">0</span> fighters</p>
    </div>

    <!-- Search and Filter Form -->
    <div style="margin-bottom: 20px;">
        <form method="get" th:action="@{/fighters}" style="display: flex; gap: 15px; align-items: flex-end;">
            <!-- Search Input -->
            <div style="flex: 1;">
                <label for="search-input">Search</label>
                <input type="text" id="search-input" name="search" th:value="${search}" placeholder="Search by name or health" style="width: 100%; padding: 6px;">
            </div>

            <!-- Filter Type -->
            <div style="min-width: 150px;">
                <label for="filter-type">Filter Type</label>
                <select id="filter-type" name="filterType" onchange="this.form.submit();" style="width: 100%; padding: 6px;">
                    <option value="" th:selected="${filterType==''}">All</option>
                    <option value="name" th:selected="${filterType=='name'}">By Name</option>
                    <option value="health" th:selected="${filterType=='health'}">By Health</option>
                    <option value="strongest" th:selected="${filterType=='strongest'}">Strongest</option>
                    <option value="balanced" th:selected="${filterType=='balanced'}">Balanced</option>
                </select>
            </div>

            <!-- Sort Column -->
            <div style="min-width: 120px;">
                <label for="sort">Sort By</label>
                <select id="sort" name="sort" onchange="this.form.submit();" style="width: 100%; padding: 6px;">
                    <option value="id" th:selected="${sort=='id'}">ID</option>
                    <option value="name" th:selected="${sort=='name'}">Name</option>
                    <option value="health" th:selected="${sort=='health'}">Health</option>
                    <option value="damage" th:selected="${sort=='damage'}">Damage</option>
                    <option value="resistance" th:selected="${sort=='resistance'}">Resistance</option>
                </select>
            </div>

            <!-- Direction -->
            <div style="min-width: 120px;">
                <label for="direction">Direction</label>
                <select id="direction" name="direction" onchange="this.form.submit();" style="width: 100%; padding: 6px;">
                    <option value="ASC" th:selected="${direction=='ASC'}">Ascending</option>
                    <option value="DESC" th:selected="${direction=='DESC'}">Descending</option>
                </select>
            </div>

            <!-- Search and Reset -->
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/fighters}" class="btn btn-secondary">Reset</a>
        </form>
    </div>

    <!-- Fighters Table -->
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>
                    <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${size}, sort='name', direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Name <span th:if="${sort=='name'}" th:text="${direction=='ASC'?'âē':'âž'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${size}, sort='health', direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Health <span th:if="${sort=='health'}" th:text="${direction=='ASC'?'âē':'âž'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${size}, sort='damage', direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Damage <span th:if="${sort=='damage'}" th:text="${direction=='ASC'?'âē':'âž'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage}, size=${size}, sort='resistance', direction=${direction=='ASC'?'DESC':'ASC'})}">
                        Resistance <span th:if="${sort=='resistance'}" th:text="${direction=='ASC'?'âē':'âž'}"></span>
                    </a>
                </th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="fighter, itr : ${fighters}">
                <td th:text="${fighter.name}">Fighter Name</td>
                <td th:text="${fighter.health}">1000</td>
                <td th:text="${fighter.damage}">50</td>
                <td th:text="${fighter.resistance}">5.0</td>
            </tr>
            <tr th:if="${fighters.isEmpty()}">
                <td colspan="4" style="text-align:center;">No fighters found</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
        <span>Showing <span th:text="${startIndex}">1</span> to <span th:text="${endIndex}">10</span> of <span th:text="${total}">0</span> fighters</span>
        <div style="display:flex; gap:5px;">
            <a th:if="${currentPage>0}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=0, size=${size}, sort=${sort}, direction=${direction})}">ÂŦ First</a>
            <span th:if="${currentPage==0}">ÂŦ First</span>

            <a th:if="${hasPrevious}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage-1}, size=${size}, sort=${sort}, direction=${direction})}">âđ Prev</a>
            <span th:if="${!hasPrevious}">âđ Prev</span>

            <span>Page <span th:text="${currentPage+1}">1</span> of <span th:text="${totalPages}">1</span></span>

            <a th:if="${hasNext}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${currentPage+1}, size=${size}, sort=${sort}, direction=${direction})}">Next âš</a>
            <span th:if="${!hasNext}">Next âš</span>

            <a th:if="${currentPage<totalPages-1}" th:href="@{/fighters(search=${search}, filterType=${filterType}, page=${totalPages-1}, size=${size}, sort=${sort}, direction=${direction})}">Last Âŧ</a>
            <span th:if="${currentPage>=totalPages-1}">Last Âŧ</span>
        </div>
    </div>

</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
