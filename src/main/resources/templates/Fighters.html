<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">

    <h2 class="text-center">Fighters</h2>

    <!-- Search + Filter Form -->
    <form method="get" action="/fighters" class="mb-3">
        <input type="text" name="search" placeholder="Search name..."
               th:value="${search}" />

        <select name="filterType">
            <option value="all" th:selected="${filterType == 'all'}">All</option>
            <option value="name" th:selected="${filterType == 'name'}">By Name</option>
            <option value="health" th:selected="${filterType == 'health'}">By Health</option>
            <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
            <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
        </select>

        <input type="hidden" name="size" th:value="${pageSize}" />

        <button type="submit">Search</button>
        <a href="/fighters">Clear</a>
    </form>

    <!-- Fighters Table -->
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>#</th>

                <!-- Sortable Name -->
                <th>
                    <a th:href="@{/fighters(sort='name', direction=${direction == 'ASC' ? 'DESC' : 'ASC'},
                        search=${search}, filterType=${filterType}, size=${pageSize})}">
                        Name
                        <span th:if="${sort == 'name'}"
                              th:text="${direction == 'ASC' ? 'тЖС' : 'тЖУ'}"></span>
                    </a>
                </th>

                <!-- Sortable Health -->
                <th>
                    <a th:href="@{/fighters(sort='health', direction=${direction == 'ASC' ? 'DESC' : 'ASC'},
                        search=${search}, filterType=${filterType}, size=${pageSize})}">
                        Health
                        <span th:if="${sort == 'health'}"
                              th:text="${direction == 'ASC' ? 'тЖС' : 'тЖУ'}"></span>
                    </a>
                </th>

                <!-- Sortable Damage -->
                <th>
                    <a th:href="@{/fighters(sort='damage', direction=${direction == 'ASC' ? 'DESC' : 'ASC'},
                        search=${search}, filterType=${filterType}, size=${pageSize})}">
                        Damage
                        <span th:if="${sort == 'damage'}"
                              th:text="${direction == 'ASC' ? 'тЖС' : 'тЖУ'}"></span>
                    </a>
                </th>

                <!-- Sortable Resistance -->
                <th>
                    <a th:href="@{/fighters(sort='resistance', direction=${direction == 'ASC' ? 'DESC' : 'ASC'},
                        search=${search}, filterType=${filterType}, size=${pageSize})}">
                        Resistance
                        <span th:if="${sort == 'resistance'}"
                              th:text="${direction == 'ASC' ? 'тЖС' : 'тЖУ'}"></span>
                    </a>
                </th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="fighter, itr : ${fighters}">
                <td th:text="${(currentPage * pageSize) + itr.index + 1}"></td> <!--   display numbers correctly on each page    -->
                <td th:text="${fighter.name}"></td>
                <td th:text="${fighter.health}"></td>
                <td th:text="${fighter.damage}"></td>
                <td th:text="${fighter.resistance}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="mt-3">
        <a th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction},
            search=${search}, filterType=${filterType})}">First&nbsp;</a>

        <a th:if="${hasPrevious}"
           th:href="@{/fighters(page=${currentPage - 1}, size=${pageSize}, sort=${sort},
           direction=${direction}, search=${search}, filterType=${filterType})}">
            Previous&nbsp;
        </a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction},
                search=${search}, filterType=${filterType})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active' : ''"></a>
        </span>

        <a th:if="${hasNext}"
           th:href="@{/fighters(page=${currentPage + 1}, size=${pageSize}, sort=${sort},
           direction=${direction}, search=${search}, filterType=${filterType})}">
            Next
        </a>
        <br>
        <a th:href="@{/fighters(page=${totalPages - 1}, size=${pageSize}, sort=${sort},
            direction=${direction}, search=${search}, filterType=${filterType})}">Last</a>

        <p>Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span></p>
    </div>

    <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>

</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
