<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>

<body>

<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">

```
<!-- PAGE HEADER -->
<div class="app-header text-center">
    <h2>Fighters</h2>
    <p class="text-muted">
        Showing <span th:text="${totalElements}">0</span> fighters
    </p>
</div>
<form th:action="@{/fighters}" method="get" class="mb-3">
    <div class="row g-2">
        <div class="col-md-4">
            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Search fighter..."
                   th:value="${search}">
        </div>
        <div class="col-md-3">
            <select name="filterType" class="form-select">
                <option value="" th:selected="${filterType == null}">All Fighters</option>
                <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                <option value="health" th:selected="${filterType == 'health'}">By Health</option>
                <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                <option value="balanced" th:selected="${filterType == 'balanced'}">Balance</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-success w-100">
                Search
            </button>
        </div>
        <div class="col-md-2">
            <a th:href="@{/fighters}" class="btn btn-secondary w-100">
                Clear
            </a>
        </div>
    </div>
</form>
<div class="players-card">
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>#</th>
                <th>
                    <a th:href="@{/fighters(page=${currentPage},size=${pageSize},sort='name',direction=${direction=='ASC'?'DESC':'ASC'},search=${search},filterType=${filterType})}">
                        Name
                        <span th:if="${sort=='name'}"
                              th:text="${direction=='ASC' ? '↑' : '↓'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/fighters(page=${currentPage},size=${pageSize},sort='health',direction=${direction=='ASC'?'DESC':'ASC'},search=${search},filterType=${filterType})}">
                        Health
                        <span th:if="${sort=='health'}"
                              th:text="${direction=='ASC' ? '↑' : '↓'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/fighters(page=${currentPage},size=${pageSize},sort='damage',direction=${direction=='ASC'?'DESC':'ASC'},search=${search},filterType=${filterType})}">
                        Damage
                        <span th:if="${sort=='damage'}"
                              th:text="${direction=='ASC' ? '↑' : '↓'}"></span>
                    </a>
                </th>
                <th>
                    <a th:href="@{/fighters(page=${currentPage},size=${pageSize},sort='resistance',direction=${direction=='ASC'?'DESC':'ASC'},search=${search},filterType=${filterType})}">
                        Resistance
                        <span th:if="${sort=='resistance'}"
                              th:text="${direction=='ASC' ? '↑' : '↓'}"></span>
                    </a>
                </th>
            </tr>
            </thead>
            <tbody>
                <tr th:each="fighter, itr : ${fighters}">
                    <th scope="row" th:text="${itr.count}">1</th>
                    <td th:text="${fighter.name}">Name</td>
                    <td th:text="${fighter.health}">1200</td>
                    <td th:text="${fighter.damage}">50</td>
                    <td th:text="${fighter.resistance}">5</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="mt-4 text-center">
    <p>
        Page <span th:text="${currentPage + 1}"></span>
        of
        <span th:text="${totalPages}"></span>
    </p>
    <div>
        <a th:if="${hasPrevious}"
           th:href="@{/fighters(page=0,size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
           class="btn btn-outline-primary btn-sm">
            First
        </a>
        <a th:if="${hasPrevious}"
           th:href="@{/fighters(page=${currentPage-1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
           class="btn btn-outline-primary btn-sm">
            Previous
        </a>
        <a th:if="${hasNext}"
           th:href="@{/fighters(page=${currentPage+1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
           class="btn btn-outline-primary btn-sm">
            Next
        </a>
        <a th:if="${hasNext}"
           th:href="@{/fighters(page=${totalPages-1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
           class="btn btn-outline-primary btn-sm">
            Last
        </a>
    </div>
</div>
        <div class="mt-3">
            <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
        </div>
</div>
<div th:insert="fragments/base :: assetsScripts"></div>

</body>
</html>
