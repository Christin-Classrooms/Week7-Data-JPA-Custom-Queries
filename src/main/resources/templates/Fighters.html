<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">Showing <span th:text="${totalElements}">0</span> fighters</p>
    </div>

    <!-- Search/Filter Form -->
    <form th:action="@{/fighters}" method="get" class="mb-4">
        <div class="row g-3 align-items-center">
            <div class="col-md-4">
                <input type="text" name="search" class="form-control" placeholder="Search by name..." th:value="${search}">
            </div>
            <div class="col-md-3">
                <select name="filterType" class="form-select">
                    <option value="">All Fighters</option>
                    <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                    <option value="health" th:selected="${filterType == 'health'}">Health > 1200</option>
                    <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest (Damage)</option>
                    <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                </select>
            </div>
            <div class="col-md-5">
                <button type="submit" class="btn btn-primary">Apply Filter</button>
                <a th:href="@{/fighters}" class="btn btn-outline-secondary">Clear</a>
            </div>
        </div>
        <!-- Preserve current sort and size -->
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="direction" th:value="${direction}">
        <input type="hidden" name="size" th:value="${pageSize}">
    </form>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, size=${pageSize}, sort='id', direction=${sort == 'id' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            # <span th:if="${sort == 'id'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, size=${pageSize}, sort='name', direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Name <span th:if="${sort == 'name'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, size=${pageSize}, sort='health', direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Health <span th:if="${sort == 'health'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, size=${pageSize}, sort='damage', direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Damage <span th:if="${sort == 'damage'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, size=${pageSize}, sort='resistance', direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Resistance <span th:if="${sort == 'resistance'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fighter,itr : ${fighters}">
                    <th scope="row" th:text="${fighter.id}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination Controls -->
    <nav aria-label="Page navigation" class="mt-4" th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">First</a>
            </li>
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=${currentPage - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=${currentPage + 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Next</a>
            </li>
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/fighters(page=${totalPages - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Last</a>
            </li>
        </ul>
        <p class="text-center text-muted">Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span></p>
    </nav>

    <div class="mt-3 text-center">
        <a href="/create-fighter" class="btn btn-success">Register New Fighter</a>
    </div>

</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
