<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Fighters</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        th a { text-decoration: none; color: inherit; }
        th a:hover { text-decoration: underline; }
        .sort-arrow { font-size: 0.8rem; margin-left: 4px; }
    </style>
</head>
<body>
<div class="container mt-4">

    <h2 class="mb-3">Fighters</h2>

    <!-- ══ Search / Filter Form ══════════════════════════════════════════════ -->
    <form th:action="@{/fighters}" method="get" class="row g-2 mb-4 align-items-end">

        <!-- Hidden: keep sort/direction/size across filter changes -->
        <input type="hidden" name="sort"      th:value="${sort}"/>
        <input type="hidden" name="direction" th:value="${direction}"/>
        <input type="hidden" name="size"      th:value="${pageSize}"/>

        <!-- Name search text box -->
        <div class="col-md-4">
            <label for="search" class="form-label">Search Name</label>
            <input type="text" id="search" name="search" class="form-control"
                   placeholder="e.g. Kazuya" th:value="${search}"/>
        </div>

        <!-- Filter type dropdown -->
        <div class="col-md-3">
            <label for="filterType" class="form-label">Filter Type</label>
            <select id="filterType" name="filterType" class="form-select">
                <option value="all"      th:selected="${filterType == 'all'}">All Fighters</option>
                <option value="name"     th:selected="${filterType == 'name'}">By Name</option>
                <option value="health"   th:selected="${filterType == 'health'}">By Health (&gt; 1200)</option>
                <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest Fighters</option>
                <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced Fighters</option>
            </select>
        </div>

        <!-- Buttons -->
        <div class="col-md-auto">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/fighters}" class="btn btn-secondary ms-2">Clear</a>
        </div>

    </form>

    <!-- ══ Result count ═══════════════════════════════════════════════════════ -->
    <p class="text-muted">
        Showing page <span th:text="${currentPage + 1}"></span>
        of <span th:text="${totalPages}"></span>
        &mdash; <span th:text="${totalElements}"></span> total fighters
    </p>

    <!-- ══ Add Fighter button ════════════════════════════════════════════════ -->
    <a th:href="@{/fighters/new}" class="btn btn-success mb-3">+ Add Fighter</a>

    <!-- ══ Fighters Table ════════════════════════════════════════════════════ -->
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>

            <!-- Name header — sortable -->
            <th>
                <a th:href="@{/fighters(page=0,
                                        size=${pageSize},
                                        sort='name',
                                        direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'},
                                        search=${search},
                                        filterType=${filterType})}">
                    Name
                    <span class="sort-arrow" th:if="${sort == 'name'}"
                          th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                </a>
            </th>

            <!-- Health header — sortable -->
            <th>
                <a th:href="@{/fighters(page=0,
                                        size=${pageSize},
                                        sort='health',
                                        direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'},
                                        search=${search},
                                        filterType=${filterType})}">
                    Health
                    <span class="sort-arrow" th:if="${sort == 'health'}"
                          th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                </a>
            </th>

            <!-- Damage header — sortable -->
            <th>
                <a th:href="@{/fighters(page=0,
                                        size=${pageSize},
                                        sort='damage',
                                        direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'},
                                        search=${search},
                                        filterType=${filterType})}">
                    Damage
                    <span class="sort-arrow" th:if="${sort == 'damage'}"
                          th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                </a>
            </th>

            <!-- Resistance header — sortable -->
            <th>
                <a th:href="@{/fighters(page=0,
                                        size=${pageSize},
                                        sort='resistance',
                                        direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'},
                                        search=${search},
                                        filterType=${filterType})}">
                    Resistance
                    <span class="sort-arrow" th:if="${sort == 'resistance'}"
                          th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                </a>
            </th>

            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="fighter : ${fighters}">
            <td th:text="${fighter.id}"></td>
            <td th:text="${fighter.name}"></td>
            <td th:text="${fighter.health}"></td>
            <td th:text="${fighter.damage}"></td>
            <td th:text="${fighter.resistance}"></td>
            <td>
                <a th:href="@{/fighters/{id}/edit(id=${fighter.id})}" class="btn btn-sm btn-warning">Edit</a>
                <form th:action="@{/fighters/{id}/delete(id=${fighter.id})}" method="post"
                      style="display:inline"
                      onsubmit="return confirm('Delete this fighter?')">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(fighters)}">
            <td colspan="6" class="text-center text-muted">No fighters found.</td>
        </tr>
        </tbody>
    </table>

    <!-- ══ Pagination Controls ════════════════════════════════════════════════ -->
    <nav aria-label="Fighters pagination" th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center flex-wrap">

            <!-- First -->
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
                    &laquo; First
                </a>
            </li>

            <!-- Previous -->
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=${currentPage - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
                    &lsaquo; Prev
                </a>
            </li>

            <!-- Page number buttons (show up to 5 around current page) -->
            <th:block th:with="
                start=${T(java.lang.Math).max(0, currentPage - 2)},
                end=${T(java.lang.Math).min(totalPages - 1, currentPage + 2)}">
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(start, end)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
                       th:text="${i + 1}"></a>
                </li>
            </th:block>

            <!-- Next -->
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=${currentPage + 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
                    Next &rsaquo;
                </a>
            </li>

            <!-- Last -->
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/fighters(page=${totalPages - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
                    Last &raquo;
                </a>
            </li>

        </ul>

        <!-- Page X of Y label -->
        <p class="text-center text-muted mt-1">
            Page <span th:text="${currentPage + 1}"></span>
            of <span th:text="${totalPages}"></span>
        </p>
    </nav>

</div>
</body>
</html>
