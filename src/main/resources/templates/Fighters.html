<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fighters</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Fighters</h1>

<form th:action="@{/fighters}" method="get">
    <input type="text" name="search" placeholder="Search fighters..." th:value="${search}">

    <select name="filterType">
        <option value="all" th:selected="${filterType == 'all'}">All</option>
        <option value="name" th:selected="${filterType == 'name'}">By Name</option>
        <option value="health" th:selected="${filterType == 'health'}">By Health</option>
        <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
        <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
    </select>

    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="direction" th:value="${direction}">
    <input type="hidden" name="size" th:value="${size}">

    <button type="submit">Search</button>
    <a th:href="@{/fighters}">Clear</a>
</form>

<br>

<table border="1">
    <thead>
    <tr>
        <th>
            <a th:href="@{/fighters(page=0,size=${size},sort='name',direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                Name
                <span th:if="${sort == 'name'}" th:text="${direction == 'ASC' ? 'Ōåæ' : 'Ōåō'}"></span>
            </a>
        </th>
        <th>
            <a th:href="@{/fighters(page=0,size=${size},sort='health',direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                Health
                <span th:if="${sort == 'health'}" th:text="${direction == 'ASC' ? 'Ōåæ' : 'Ōåō'}"></span>
            </a>
        </th>
        <th>
            <a th:href="@{/fighters(page=0,size=${size},sort='damage',direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                Damage
                <span th:if="${sort == 'damage'}" th:text="${direction == 'ASC' ? 'Ōåæ' : 'Ōåō'}"></span>
            </a>
        </th>
        <th>
            <a th:href="@{/fighters(page=0,size=${size},sort='resistance',direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                Resistance
                <span th:if="${sort == 'resistance'}" th:text="${direction == 'ASC' ? 'Ōåæ' : 'Ōåō'}"></span>
            </a>
        </th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="fighter : ${fighters}">
        <td th:text="${fighter.name}"></td>
        <td th:text="${fighter.health}"></td>
        <td th:text="${fighter.damage}"></td>
        <td th:text="${fighter.resistance}"></td>
    </tr>
    </tbody>
</table>

<br>

<div th:if="${totalPages > 0}">
    <p th:text="'Page ' + ${currentPage + 1} + ' of ' + ${totalPages}"></p>

    <a th:if="${hasPrevious}"
       th:href="@{/fighters(page=0,size=${size},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
        First
    </a>

    <a th:if="${hasPrevious}"
       th:href="@{/fighters(page=${currentPage - 1},size=${size},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
        Previous
    </a>

    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a th:if="${i != currentPage}"
           th:href="@{/fighters(page=${i},size=${size},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
           th:text="${i + 1}"></a>
        <span th:if="${i == currentPage}" th:text="${i + 1}"></span>
    </span>

    <a th:if="${hasNext}"
       th:href="@{/fighters(page=${currentPage + 1},size=${size},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
        Next
    </a>

    <a th:if="${hasNext}"
       th:href="@{/fighters(page=${totalPages - 1},size=${size},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
        Last
    </a>
</div>

</body>
</html>
