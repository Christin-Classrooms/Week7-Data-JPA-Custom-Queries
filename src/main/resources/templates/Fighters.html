<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Fighter List</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="container mt-5">
    <h2>Fighter Database</h2>

    <form th:action="@{/fighters}" method="get" class="row g-3 mb-4">
      <div class="col-md-4">
        <input
          type="text"
          name="search"
          th:value="${search}"
          class="form-control"
          placeholder="Search..."
        />
      </div>
      <div class="col-md-3">
        <select name="filterType" class="form-select">
          <option value="all" th:selected="${filterType == 'all'}">
            All Fighters
          </option>
          <option value="name" th:selected="${filterType == 'name'}">
            By Name
          </option>
          <option value="health" th:selected="${filterType == 'health'}">
            Min Health
          </option>
          <option value="strongest" th:selected="${filterType == 'strongest'}">
            Strongest
          </option>
          <option value="balanced" th:selected="${filterType == 'balanced'}">
            Balanced
          </option>
        </select>
      </div>
      <div class="col-md-3">
        <button type="submit" class="btn btn-primary">Filter</button>
        <a th:href="@{/fighters}" class="btn btn-secondary">Clear</a>
      </div>
    </form>

    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th>
            <a
              th:href="@{/fighters(page=${currentPage}, sort='id', direction=${reverseDirection}, search=${search}, filterType=${filterType})}"
              >ID
              <span
                th:if="${sort == 'id'}"
                th:text="${direction == 'ASC' ? '↑' : '↓'}"
              ></span
            ></a>
          </th>
          <th>
            <a
              th:href="@{/fighters(page=${currentPage}, sort='name', direction=${reverseDirection}, search=${search}, filterType=${filterType})}"
              >Name
              <span
                th:if="${sort == 'name'}"
                th:text="${direction == 'ASC' ? '↑' : '↓'}"
              ></span
            ></a>
          </th>
          <th>
            <a
              th:href="@{/fighters(page=${currentPage}, sort='health', direction=${reverseDirection}, search=${search}, filterType=${filterType})}"
              >Health
              <span
                th:if="${sort == 'health'}"
                th:text="${direction == 'ASC' ? '↑' : '↓'}"
              ></span
            ></a>
          </th>
          <th>
            <a
              th:href="@{/fighters(page=${currentPage}, sort='damage', direction=${reverseDirection}, search=${search}, filterType=${filterType})}"
              >Damage
              <span
                th:if="${sort == 'damage'}"
                th:text="${direction == 'ASC' ? '↑' : '↓'}"
              ></span
            ></a>
          </th>
          <th>
            <a
              th:href="@{/fighters(page=${currentPage}, sort='resistance', direction=${reverseDirection}, search=${search}, filterType=${filterType})}"
              >Resistance
              <span
                th:if="${sort == 'resistance'}"
                th:text="${direction == 'ASC' ? '↑' : '↓'}"
              ></span
            ></a>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="f : ${fighters}">
          <td th:text="${f.id}"></td>
          <td th:text="${f.name}"></td>
          <td th:text="${f.health}"></td>
          <td th:text="${f.damage}"></td>
          <td th:text="${f.resistance}"></td>
        </tr>
      </tbody>
    </table>

    <nav th:if="${totalPages > 0}">
      <ul class="pagination">
        <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
          <a
            class="page-link"
            th:href="@{/fighters(page=0, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
            >First</a
          >
        </li>
        <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
          <a
            class="page-link"
            th:href="@{/fighters(page=${currentPage - 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
            >Previous</a
          >
        </li>
        <li class="page-item disabled">
          <span class="page-link"
            >Page [[${currentPage + 1}]] of [[${totalPages}]]</span
          >
        </li>
        <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
          <a
            class="page-link"
            th:href="@{/fighters(page=${currentPage + 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
            >Next</a
          >
        </li>
        <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
          <a
            class="page-link"
            th:href="@{/fighters(page=${totalPages - 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
            >Last</a
          >
        </li>
      </ul>
    </nav>

    <div class="mt-4">
      <a th:href="@{/register}" class="btn btn-success">Add New Fighter</a>
    </div>
  </body>
</html>
