<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">Showing <span th:text="${totalElements}">0</span> fighters</p>
    </div>

    <div class="players-card">

        <div style="padding: 20px; border-bottom: 1px solid #e0e0e0;">
            <form method="get" th:action="@{/fighters}" style="display: flex; gap: 15px; align-items: flex-end;">
                <!-- Search Input -->
                <div style="flex: 1;">
                    <label for="search-input" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Search by Name</label>
                    <input type="text" id="search-input" name="search" th:value="${search}" placeholder="Enter fighter name..."
                           style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                </div>

                <!-- Sort By Dropdown -->
                <div style="min-width: 150px;">
                    <label for="filterType-select" style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px;">Filter Type</label>
                    <select id="filterType-select" name="filterType" onchange="this.form.submit();" style="width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="all" th:selected="${filterType == 'all'}">All</option>
                        <option value="name" th:selected="${filterType == 'name'}">Name</option>
                        <option value="health" th:selected="${filterType == 'health'}">Health</option>
                        <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                        <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                    </select>
                </div>

                <!-- Search Button -->
                <button type="submit" style="padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">
                    Search
                </button>

                <!-- Reset Button -->
                <a th:href="@{/fighters}" style="padding: 8px 16px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block;">
                    Reset
                </a>
            </form>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">
                        <a th:href="@{/fighters(search=${search},filterType=${filterType}, minHealth=${minHealth}, maxDamage=${maxDamage}, page=${currentPage}, size=${pageSize}, sort='name', direction=${sort=='name' and direction=='ASC'?'DESC':'ASC'})}"
                           style="color: #333; text-decoration: none; cursor: pointer;">
                        Name
                            <span style="font-size: 12px; color: #999;" th:if="${sort == 'name'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(search=${search}, filterType=${filterType}, minHealth=${minHealth}, maxDamage=${maxDamage}, page=${currentPage}, size=${pageSize}, sort='health', direction=${sort=='health' and direction=='ASC'?'DESC':'ASC'})}"
                           style="color: #333; text-decoration: none; cursor: pointer;">
                            Health
                            <span style="font-size: 12px; color: #999;" th:if="${sort == 'health'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(search=${search},filterType=${filterType}, minHealth=${minHealth}, maxDamage=${maxDamage}, page=${currentPage}, size=${pageSize}, sort='damage', direction=${sort=='damage' and direction=='ASC'?'DESC':'ASC'})}"
                           style="color: #333; text-decoration: none; cursor: pointer;">
                        Damage
                            <span style="font-size: 12px; color: #999;" th:if="${sort == 'damage'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(search=${search},filterType=${filterType}, minHealth=${minHealth}, maxDamage=${maxDamage}, page=${currentPage}, size=${pageSize}, sort='resistance', direction=${sort=='resistance' and direction=='ASC'?'DESC':'ASC'})}"
                           style="color: #333; text-decoration: none; cursor: pointer;">
                        Resistance
                            <span style="font-size: 12px; color: #999;" th:if="${sort == 'resistance'}">
                                <span th:if="${direction == 'ASC'}">▲</span>
                                <span th:if="${direction == 'DESC'}">▼</span>
                            </span>
                        </a>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fighter : ${fighters}">
                    <th th:text="${fighter.id}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                <tr th:if="${fighters.isEmpty()}" style="border-bottom: 1px solid #eee;">
                    <td colspan="5" style="padding: 20px; text-align: center; color: #999;">No fighters found</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination Footer -->
        <div style="padding: 15px 20px; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #666;">
            <span id="showing-info">Showing <span th:text="${startIndex}">1</span> to <span th:text="${endIndex}">10</span> of <span th:text="${totalElements}">100</span> entries</span>

            <!-- Pagination Controls -->
            <div style="display: flex; gap: 5px; align-items: center;">
                <!-- First Page -->
                <a th:if="${currentPage > 0}" th:href="@{/fighters(search=${search},filterType=${filterType},minHealth=${minHealth},maxDamage=${maxDamage}, page=0, size=${pageSize}, sort=${sort}, direction=${direction})}"
                   style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                    « First
                </a>
                <span th:if="${currentPage == 0}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                    « First
                </span>

                <!-- Previous Page -->
                <a th:if="${hasPrevious}" th:href="@{/fighters(search=${search},filterType=${filterType},minHealth=${minHealth},maxDamage=${maxDamage}, page=${currentPage - 1}, size=${pageSize}, sort=${sort}, direction=${direction})}"
                   style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                    ‹ Prev
                </a>
                <span th:if="${!hasPrevious}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                    ‹ Prev
                </span>

                <!-- Page Numbers -->
                <span style="padding: 6px 10px; font-size: 12px;">
                    Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">5</span>
                </span>

                <!-- Next Page -->
                <a th:if="${hasNext}" th:href="@{/fighters(search=${search},filterType=${filterType},minHealth=${minHealth},maxDamage=${maxDamage}, page=${currentPage + 1}, size=${pageSize}, sort=${sort}, direction=${direction})}"
                   style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                    Next ›
                </a>
                <span th:if="${!hasNext}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                    Next ›
                </span>

                <!-- Last Page -->
                <a th:if="${currentPage < totalPages - 1}" th:href="@{/fighters(search=${search},filterType=${filterType},minHealth=${minHealth},maxDamage=${maxDamage}, page=${totalPages - 1}, size=${pageSize}, sort=${sort}, direction=${direction})}"
                   style="padding: 6px 10px; border: 1px solid #ddd; background: white; border-radius: 4px; font-size: 12px; text-decoration: none; color: #333; cursor: pointer;">
                    Last »
                </a>
                <span th:if="${currentPage >= totalPages - 1}" style="padding: 6px 10px; border: 1px solid #ddd; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #999;">
                    Last »
                </span>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
