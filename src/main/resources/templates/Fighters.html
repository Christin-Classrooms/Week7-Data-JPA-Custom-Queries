<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">Showing <span th:text="${totalElements}">0</span> fighters</p>
    </div>

    <div class="players-card mb-3">
        <form th:action="@{/fighters}" method="get" class="row g-2 align-items-end">
            <div class="col-md-4">
                <label for="search" class="form-label">Search</label>
                <input type="text" id="search" name="search" class="form-control"
                       placeholder="Enter fighter name or health"
                       th:value="${search}">
            </div>

            <div class="col-md-3">
                <label for="filterType" class="form-label">Filter Type</label>
                <select id="filterType" name="filterType" class="form-select">
                    <option value="all" th:selected="${filterType == 'all'}">All</option>
                    <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                    <option value="health" th:selected="${filterType == 'health'}">By Health</option>
                    <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                    <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                </select>
            </div>

            <div class="col-md-2">
                <input type="hidden" name="sort" th:value="${sort}">
                <input type="hidden" name="direction" th:value="${direction}">
                <input type="hidden" name="size" th:value="${pageSize}">
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </div>

            <div class="col-md-2">
                <a th:href="@{/fighters}" class="btn btn-secondary w-100">Clear</a>
            </div>
        </form>
    </div>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">ID</th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='name',
                            direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search}, filterType=${filterType})}">
                            Name
                        </a>
                        <span th:if="${sort == 'name'}"
                              th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='health',
                            direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search}, filterType=${filterType})}">
                            Health
                        </a>
                        <span th:if="${sort == 'health'}"
                              th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='damage',
                            direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search}, filterType=${filterType})}">
                            Damage
                        </a>
                        <span th:if="${sort == 'damage'}"
                              th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='resistance',
                            direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search}, filterType=${filterType})}">
                            Resistance
                        </a>
                        <span th:if="${sort == 'resistance'}"
                              th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                    </th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="fighter : ${fighters}">
                    <td th:text="${fighter.id}">1</td>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50</td>
                    <td th:text="${fighter.resistance}">5</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>        

    <div class="mt-3" th:if="${totalPages > 0}">
        <p th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></p>

        <a class="btn btn-outline-primary btn-sm me-1"
           th:if="${hasPrevious}"
           th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
            First
        </a>

        <a class="btn btn-outline-primary btn-sm me-1"
           th:if="${hasPrevious}"
           th:href="@{/fighters(page=${currentPage - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
            Previous
        </a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a class="btn btn-outline-secondary btn-sm me-1"
               th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
               th:text="${i + 1}"></a>
        </span>

        <a class="btn btn-outline-primary btn-sm me-1"
           th:if="${hasNext}"
           th:href="@{/fighters(page=${currentPage + 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
            Next
        </a>

        <a class="btn btn-outline-primary btn-sm"
           th:if="${hasNext}"
           th:href="@{/fighters(page=${totalPages - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
            Last
        </a>
    </div>

    <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
