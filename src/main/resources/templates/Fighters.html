<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">Showing <span th:text="${totalElements}">0</span> fighters</p>
    </div>

    <!-- the search and filter form -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" action="/fighters" class="row g-3">
                <!-- hidden fields to preserve pagination and sorting when youre filtering -->
                <input type="hidden" name="page" value="0" />
                <input type="hidden" name="sort" th:value="${sort}" />
                <input type="hidden" name="direction" th:value="${direction}" />
                
                <div class="col-md-6">
                    <label for="search" class="form-label">Search/Value</label>
                    <input type="text" class="form-control" id="search" name="search" 
                           th:value="${search}" placeholder="Enter search term or values...">
                </div>
                
                <div class="col-md-4">
                    <label for="filterType" class="form-label">Filter Type</label>
                    <select class="form-select" id="filterType" name="filterType">
                        <option value="all" th:selected="${filterType == 'all'}">All Fighters</option>
                        <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                        <option value="health" th:selected="${filterType == 'health'}">By Health (enter number)</option>
                        <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest Fighters</option>
                        <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced Fighters (minHealth,maxDamage)</option>
                    </select>
                    <small class="text-muted" th:if="${filterType == 'balanced'}">Format: minHealth,maxDamage (e.g., 1000,50)</small>
                </div>
                
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">Apply Filter</button>
                    <a href="/fighters" class="btn btn-secondary">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <!-- these are sortable headers -->
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='name', direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}" 
                           class="text-decoration-none text-dark">
                            Name
                            <span th:if="${sort == 'name'}" th:utext="${direction == 'ASC' ? '&uarr;' : '&darr;'}"></span>
                        </a>
                    </th>
                    <!-- if youre reading this hi it took me a while-->
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='health', direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}"
                           class="text-decoration-none text-dark">
                            Health
                            <span th:if="${sort == 'health'}" th:utext="${direction == 'ASC' ? '&uarr;' : '&darr;'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='damage', direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}"
                           class="text-decoration-none text-dark">
                            Damage
                            <span th:if="${sort == 'damage'}" th:utext="${direction == 'ASC' ? '&uarr;' : '&darr;'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='resistance', direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}"
                           class="text-decoration-none text-dark">
                            Resistance
                            <span th:if="${sort == 'resistance'}" th:utext="${direction == 'ASC' ? '&uarr;' : '&darr;'}"></span>
                        </a>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fighter,itr : ${fighters}">
                    <th scope="row" th:text="${currentPage * pageSize + itr.index + 1}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                <tr th:if="${fighters.empty}">
                    <td colspan="5" class="text-center">No fighters found</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- the pagination controls -->
    <div th:if="${totalPages > 0}" class="d-flex justify-content-between align-items-center mt-4">
        <div>
            <span>Page </span>
            <span th:text="${currentPage + 1}">1</span>
            <span> of </span>
            <span th:text="${totalPages}">10</span>
        </div>
        
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <!-- first page -->
                <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                    <a class="page-link" 
                       th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">First</a>
                </li>
                
                <!-- prev page -->
                <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                    <a class="page-link" 
                       th:href="@{/fighters(page=${currentPage - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Previous</a>
                </li>
                
                <!-- the page numbers -->
                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                    class="page-item" 
                    th:classappend="${i == currentPage} ? 'active'"
                    th:if="${i >= currentPage - 2 and i <= currentPage + 2}">
                    <a class="page-link" 
                       th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
                       th:text="${i + 1}">1</a>
                </li>
                
                <!-- next page -->
                <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                    <a class="page-link" 
                       th:href="@{/fighters(page=${currentPage + 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Next</a>
                </li>
                
                <!-- last page -->
                <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                    <a class="page-link" 
                       th:href="@{/fighters(page=${totalPages - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Last</a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
