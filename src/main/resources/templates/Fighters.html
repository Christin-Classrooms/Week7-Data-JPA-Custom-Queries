<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
    </div>

    <form method="get" action="/fighters" class="mb-3 d-flex gap-2 justify-content-center">
        <input type="text" name="search" class="form-control w-auto" placeholder="Search by name" th:value="${search}">
        <select name="filterType" class="form-select w-auto">
            <option value="all" th:selected="${filterType == 'all'}">All</option>
            <option value="name" th:selected="${filterType == 'name'}">By Name</option>
            <option value="health" th:selected="${filterType == 'health'}">By Health</option>
            <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
            <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
        </select>
        <button type="submit" class="btn btn-primary">Search</button>
        <a th:href="@{/fighters}" class="btn btn-secondary">Clear</a>
    </form>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>#</th>

                    <th>
                        <a th:href="@{/fighters(page=${currentPage}, sort='name', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Name
                            <span th:text="${sort == 'name' ? (direction == 'ASC' ? '↑' : '↓') : ''}"></span>
                        </a>
                    </th>

                    <th>
                        <a th:href="@{/fighters(page=${currentPage}, sort='health', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Health
                            <span th:text="${sort == 'health' ? (direction == 'ASC' ? '↑' : '↓') : ''}"></span>
                        </a>
                    </th>

                    <th>
                        <a th:href="@{/fighters(page=${currentPage}, sort='damage', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Damage
                            <span th:text="${sort == 'damage' ? (direction == 'ASC' ? '↑' : '↓') : ''}"></span>
                        </a>
                    </th>

                    <th>
                        <a th:href="@{/fighters(page=${currentPage}, sort='resistance', direction=${direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}">
                            Resistance
                            <span th:text="${sort == 'resistance' ? (direction == 'ASC' ? '↑' : '↓') : ''}"></span>
                        </a>
                    </th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="fighter, itr : ${fighters}">
                    <td th:text="${itr.index + 1 + (currentPage * pageSize)}"></td>
                    <td th:text="${fighter.name}"></td>
                    <td th:text="${fighter.health}"></td>
                    <td th:text="${fighter.damage}"></td>
                    <td th:text="${fighter.resistance}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-center align-items-center gap-2 mt-3">

        <a class="btn btn-outline-primary"
           th:href="@{/fighters(page=0, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
           th:classappend="${currentPage == 0} ? ' disabled'">
            First
        </a>

        <a class="btn btn-outline-primary"
           th:href="@{/fighters(page=${currentPage - 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
           th:classappend="${!hasPrevious} ? ' disabled'">
            Previous
        </a>

        <span>Page [[${currentPage + 1}]] of [[${totalPages}]]</span>

        <a class="btn btn-outline-primary"
           th:href="@{/fighters(page=${currentPage + 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
           th:classappend="${!hasNext} ? ' disabled'">
            Next
        </a>

        <a class="btn btn-outline-primary"
           th:href="@{/fighters(page=${totalPages - 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
           th:classappend="${currentPage + 1 == totalPages} ? ' disabled'">
            Last
        </a>

    </div>

    <div class="mt-3 text-center">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
