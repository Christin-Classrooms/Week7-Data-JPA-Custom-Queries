<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">
            Showing <span th:text="${totalElements}">0</span> fighters
        </p>
    </div>

    <div class="players-card mb-4">
        <form method="get" th:action="@{/fighters}" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label for="search" class="form-label">Search</label>
                <input type="text" id="search" name="search" class="form-control"
                       th:value="${search}" placeholder="Enter search value">
            </div>

            <div class="col-md-3">
                <label for="filterType" class="form-label">Filter Type</label>
                <select id="filterType" name="filterType" class="form-select">
                    <option value="" th:selected="${filterType == null or filterType == ''}">All</option>
                    <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                    <option value="health" th:selected="${filterType == 'health'}">By Health</option>
                    <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                    <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                </select>
            </div>

            <div class="col-md-2">
                <label for="size" class="form-label">Page Size</label>
                <input type="number" id="size" name="size" class="form-control"
                       th:value="${pageSize}" min="1">
            </div>

            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="direction" th:value="${direction}">
            <input type="hidden" name="page" value="0">

            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Submit</button>
                <a th:href="@{/fighters}" class="btn btn-secondary">Clear</a>
            </div>
        </form>
    </div>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=0,size=${pageSize},sort='name',direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                            Name
                            <span th:if="${sort == 'name'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=0,size=${pageSize},sort='health',direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                            Health
                            <span th:if="${sort == 'health'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=0,size=${pageSize},sort='damage',direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                            Damage
                            <span th:if="${sort == 'damage'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(page=0,size=${pageSize},sort='resistance',direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'},search=${search},filterType=${filterType})}">
                            Resistance
                            <span th:if="${sort == 'resistance'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="fighter, itr : ${fighters}">
                    <th scope="row" th:text="${currentPage * pageSize + itr.count}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-4 flex-wrap gap-2">
        <div>
            <span th:text="'Page ' + ${currentPage + 1} + ' of ' + ${totalPages}">Page 1 of 1</span>
        </div>

        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-outline-primary btn-sm"
               th:if="${currentPage > 0}"
               th:href="@{/fighters(page=0,size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                First
            </a>

            <a class="btn btn-outline-primary btn-sm"
               th:if="${hasPrevious}"
               th:href="@{/fighters(page=${currentPage - 1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                Previous
            </a>

            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a class="btn btn-sm"
                   th:classappend="${i == currentPage} ? ' btn-primary' : ' btn-outline-primary'"
                   th:href="@{/fighters(page=${i},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}"
                   th:text="${i + 1}">
                    1
                </a>
            </span>

            <a class="btn btn-outline-primary btn-sm"
               th:if="${hasNext}"
               th:href="@{/fighters(page=${currentPage + 1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                Next
            </a>

            <a class="btn btn-outline-primary btn-sm"
               th:if="${totalPages > 0 and currentPage < totalPages - 1}"
               th:href="@{/fighters(page=${totalPages - 1},size=${pageSize},sort=${sort},direction=${direction},search=${search},filterType=${filterType})}">
                Last
            </a>
        </div>
    </div>

    <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
