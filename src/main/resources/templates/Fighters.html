<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <!-- Uses totalElements passed from the Page object in the controller -->
        <p class="text-muted">Showing <span th:text="${totalElements != null ? totalElements : 0}">0</span> fighters</p>
    </div>

    <!-- 1. Search/Filter Form -->
    <div class="container mb-4">
        <form th:action="@{/fighters}" method="get" class="row g-3 justify-content-center">
            <div class="col-auto">
                <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Search...">
            </div>
            <div class="col-auto">
                <select name="filterType" class="form-select">
                    <option value="" th:selected="${filterType == null or filterType == ''}">All</option>
                    <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                    <option value="health" th:selected="${filterType == 'health'}">By Health</option>
                    <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                    <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                </select>
            </div>
            <!-- Preserve sorting params when making a new search -->
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="direction" th:value="${direction}">
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Submit</button>
                <a th:href="@{/fighters}" class="btn btn-secondary">Clear</a>
            </div>
        </form>
    </div>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    
                    <!-- 2. Sortable Table Headers -->
                    <!-- Each header preserves the search/filter status and flips the direction if already sorted by this column -->
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, sort='name', direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}" class="text-decoration-none text-dark">
                            Name <span th:if="${sort == 'name'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, sort='health', direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}" class="text-decoration-none text-dark">
                            Health <span th:if="${sort == 'health'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, sort='damage', direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}" class="text-decoration-none text-dark">
                            Damage <span th:if="${sort == 'damage'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                    <th scope="col">
                        <a th:href="@{/fighters(page=0, sort='resistance', direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'}, search=${search}, filterType=${filterType})}" class="text-decoration-none text-dark">
                            Resistance <span th:if="${sort == 'resistance'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fighter,itr : ${fighters}">
                    <!-- Calculates correct row number across different pages -->
                    <th scope="row" th:text="${(currentPage != null ? currentPage * pageSize : 0) + itr.count}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 3. Pagination Controls -->
    <!-- Only show pagination if there is at least 1 page of records -->
    <div class="mt-4" th:if="${totalPages != null and totalPages > 0}">
        <nav aria-label="Fighter pagination">
            <ul class="pagination justify-content-center">
                <!-- First -->
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/fighters(page=0, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">First</a>
                </li>
                <!-- Previous -->
                <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                    <a class="page-link" th:href="@{/fighters(page=${currentPage - 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Previous</a>
                </li>
                
                <!-- Page Numbers dynamically generated -->
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:text="${i + 1}" th:href="@{/fighters(page=${i}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">1</a>
                </li>
                
                <!-- Next -->
                <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                    <a class="page-link" th:href="@{/fighters(page=${currentPage + 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Next</a>
                </li>
                <!-- Last -->
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/fighters(page=${totalPages - 1}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">Last</a>
                </li>
            </ul>
        </nav>
        <div class="text-center mt-2">
            Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
        </div>
    </div>

    <div class="mt-3 text-center">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
