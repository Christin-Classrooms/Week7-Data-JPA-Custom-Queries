<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">
            Showing <span th:text="${totalElements}">0</span> fighters
        </p>
    </div>

    <div class="players-card mb-4">
        <form th:action="@{/fighters}" method="get" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label for="search" class="form-label">Search</label>
                <input type="text"
                       id="search"
                       name="search"
                       class="form-control"
                       placeholder="Enter name or health"
                       th:value="${search}">
            </div>

            <div class="col-md-3">
                <label for="filterType" class="form-label">Filter Type</label>
                <select id="filterType" name="filterType" class="form-select">
                    <option value="all" th:selected="${filterType == 'all'}">All</option>
                    <option value="name" th:selected="${filterType == 'name'}">By Name</option>
                    <option value="health" th:selected="${filterType == 'health'}">By Health</option>
                    <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
                    <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
                </select>
            </div>

            <div class="col-md-2">
                <label for="size" class="form-label">Page Size</label>
                <select id="size" name="size" class="form-select">
                    <option value="5" th:selected="${pageSize == 5}">5</option>
                    <option value="10" th:selected="${pageSize == 10}">10</option>
                    <option value="20" th:selected="${pageSize == 20}">20</option>
                </select>
            </div>

            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="direction" th:value="${direction}">
            <input type="hidden" name="page" value="0">

            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Submit</button>
                <a th:href="@{/fighters}" class="btn btn-outline-secondary">Clear</a>
            </div>
        </form>
    </div>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=${currentPage},
                            size=${pageSize},
                            sort='name',
                            direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search},
                            filterType=${filterType}
                        )}" class="text-decoration-none text-dark">
                            Name
                            <span th:if="${sort == 'name'}"
                                  th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=${currentPage},
                            size=${pageSize},
                            sort='health',
                            direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search},
                            filterType=${filterType}
                        )}" class="text-decoration-none text-dark">
                            Health
                            <span th:if="${sort == 'health'}"
                                  th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=${currentPage},
                            size=${pageSize},
                            sort='damage',
                            direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search},
                            filterType=${filterType}
                        )}" class="text-decoration-none text-dark">
                            Damage
                            <span th:if="${sort == 'damage'}"
                                  th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>

                    <th scope="col">
                        <a th:href="@{/fighters(
                            page=${currentPage},
                            size=${pageSize},
                            sort='resistance',
                            direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'},
                            search=${search},
                            filterType=${filterType}
                        )}" class="text-decoration-none text-dark">
                            Resistance
                            <span th:if="${sort == 'resistance'}"
                                  th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
                        </a>
                    </th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(fighters)}">
                    <td colspan="5" class="text-center text-muted">No fighters found.</td>
                </tr>

                <tr th:each="fighter, itr : ${fighters}">
                    <th scope="row" th:text="${currentPage * pageSize + itr.count}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3 text-center" th:if="${totalPages > 0}">
        <p>
            Page <span th:text="${currentPage + 1}">1</span>
            of <span th:text="${totalPages}">1</span>
        </p>
    </div>

    <div class="d-flex justify-content-center gap-2 flex-wrap mt-3" th:if="${totalPages > 1}">
        <a th:if="${hasPrevious}"
           th:href="@{/fighters(
                page=0,
                size=${pageSize},
                sort=${sort},
                direction=${direction},
                search=${search},
                filterType=${filterType}
           )}"
           class="btn btn-outline-primary btn-sm">First</a>

        <a th:if="${hasPrevious}"
           th:href="@{/fighters(
                page=${currentPage - 1},
                size=${pageSize},
                sort=${sort},
                direction=${direction},
                search=${search},
                filterType=${filterType}
           )}"
           class="btn btn-outline-primary btn-sm">Previous</a>

        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/fighters(
                    page=${i},
                    size=${pageSize},
                    sort=${sort},
                    direction=${direction},
                    search=${search},
                    filterType=${filterType}
               )}"
               class="btn btn-sm"
               th:classappend="${i == currentPage} ? 'btn-primary' : 'btn-outline-primary'"
               th:text="${i + 1}">
                1
            </a>
        </span>

        <a th:if="${hasNext}"
           th:href="@{/fighters(
                page=${currentPage + 1},
                size=${pageSize},
                sort=${sort},
                direction=${direction},
                search=${search},
                filterType=${filterType}
           )}"
           class="btn btn-outline-primary btn-sm">Next</a>

        <a th:if="${hasNext}"
           th:href="@{/fighters(
                page=${totalPages - 1},
                size=${pageSize},
                sort=${sort},
                direction=${direction},
                search=${search},
                filterType=${filterType}
           )}"
           class="btn btn-outline-primary btn-sm">Last</a>
    </div>

    <div class="mt-4">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
