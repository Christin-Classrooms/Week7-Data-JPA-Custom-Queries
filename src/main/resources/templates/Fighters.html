<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="app-container">
    <div class="app-header text-center">
        <h2>Fighters</h2>
        <p class="text-muted">Showing <span th:text="${totalItems}">0</span> fighters</p>
    </div>

    <div class="mb-3">
        <form th:action="@{/fighters}" method="get" class="row g-2">
            <div class="col-md-4">
                <input type="text" name="search" class="form-control" placeholder="Search by fighter name"
                       th:value="${search}">
            </div>

            <div class="col-md-3">
                <select name="filterType" class="form-select">
                    <option value="" th:selected="${filterType == ''}">All Fighters</option>
                    <option value="healthy" th:selected="${filterType == 'healthy'}">Healthy Fighters</option>
                    <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest Fighters</option>
                    <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced Fighters</option>
                </select>
            </div>

            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Apply</button>
            </div>
        </form>
    </div>

    <div class="players-card">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Name</th>
                    <th scope="col">Health</th>
                    <th scope="col">Damage</th>
                    <th scope="col">Resistance</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fighter,itr : ${fighters}">
                    <th scope="row" th:text="${itr.count}">1</th>
                    <td th:text="${fighter.name}">Fighter Name</td>
                    <td th:text="${fighter.health}">1000</td>
                    <td th:text="${fighter.damage}">50.0</td>
                    <td th:text="${fighter.resistance}">5.0</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3 d-flex justify-content-between align-items-center">
        <div>
            Page <span th:text="${currentPage + 1}">1</span> of <span th:text="${totalPages}">1</span>
        </div>

        <div>
            <a class="btn btn-outline-secondary btn-sm me-2"
               th:if="${currentPage > 0}"
               th:href="@{/fighters(page=${currentPage - 1}, search=${search}, filterType=${filterType})}">
                Previous
            </a>

            <a class="btn btn-outline-secondary btn-sm"
               th:if="${currentPage + 1 < totalPages}"
               th:href="@{/fighters(page=${currentPage + 1}, search=${search}, filterType=${filterType})}">
                Next
            </a>
        </div>
    </div>

    <div class="mt-3">
        <a href="/create-fighter" class="btn btn-primary">Register New Fighter</a>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
