<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fighters</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th a {
            text-decoration: none;
            color: black;
        }

        .top-form {
            margin-bottom: 20px;
        }

        .pagination {
            margin-top: 20px;
        }

        .pagination a, .pagination span {
            margin: 0 5px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<h1>Fighters List</h1>

<form th:action="@{/fighters}" method="get" class="top-form">
    <input type="text" name="search" placeholder="Search by name" th:value="${search}">

    <select name="filterType">
        <option value="all" th:selected="${filterType == 'all'}">All</option>
        <option value="name" th:selected="${filterType == 'name'}">By Name</option>
        <option value="health" th:selected="${filterType == 'health'}">By Health</option>
        <option value="strongest" th:selected="${filterType == 'strongest'}">Strongest</option>
        <option value="balanced" th:selected="${filterType == 'balanced'}">Balanced</option>
    </select>

    <input type="hidden" name="sort" th:value="${sort}">
    <input type="hidden" name="direction" th:value="${direction}">
    <input type="hidden" name="size" th:value="${pageSize}">

    <button type="submit">Search</button>
    <a th:href="@{/fighters}">Clear</a>
</form>

<table>
    <thead>
    <tr>
        <th>ID</th>

        <th>
            <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='name',
            direction=${sort == 'name' and direction == 'ASC' ? 'DESC' : 'ASC'},
            search=${search}, filterType=${filterType})}">
                Name
                <span th:if="${sort == 'name'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th>
            <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='health',
            direction=${sort == 'health' and direction == 'ASC' ? 'DESC' : 'ASC'},
            search=${search}, filterType=${filterType})}">
                Health
                <span th:if="${sort == 'health'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th>
            <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='damage',
            direction=${sort == 'damage' and direction == 'ASC' ? 'DESC' : 'ASC'},
            search=${search}, filterType=${filterType})}">
                Damage
                <span th:if="${sort == 'damage'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
            </a>
        </th>

        <th>
            <a th:href="@{/fighters(page=${currentPage}, size=${pageSize}, sort='resistance',
            direction=${sort == 'resistance' and direction == 'ASC' ? 'DESC' : 'ASC'},
            search=${search}, filterType=${filterType})}">
                Resistance
                <span th:if="${sort == 'resistance'}" th:text="${direction == 'ASC' ? '↑' : '↓'}"></span>
            </a>
        </th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="fighter : ${fighters}">
        <td th:text="${fighter.id}"></td>
        <td th:text="${fighter.name}"></td>
        <td th:text="${fighter.health}"></td>
        <td th:text="${fighter.damage}"></td>
        <td th:text="${fighter.resistance}"></td>
    </tr>
    </tbody>
</table>

<div class="pagination">
    <a th:if="${currentPage > 0}"
       th:href="@{/fighters(page=0, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
        First
    </a>

    <a th:if="${hasPrevious}"
       th:href="@{/fighters(page=${currentPage - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
        Previous
    </a>

    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a th:if="${i != currentPage}"
           th:href="@{/fighters(page=${i}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}"
           th:text="${i + 1}"></a>
        <span th:if="${i == currentPage}" th:text="${i + 1}"></span>
    </span>

    <a th:if="${hasNext}"
       th:href="@{/fighters(page=${currentPage + 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
        Next
    </a>

    <a th:if="${totalPages > 0}"
       th:href="@{/fighters(page=${totalPages - 1}, size=${pageSize}, sort=${sort}, direction=${direction}, search=${search}, filterType=${filterType})}">
        Last
    </a>

    <p>Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span></p>
</div>

</body>
</html>
